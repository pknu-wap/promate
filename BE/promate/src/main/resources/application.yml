server:
  port: 8082

spring:
  application:
    name: "promate"

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PW}

  jpa:
    database: mysql
    database-platform: org.hibernate.dialect.MySQLDialect
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

  spring:
    security:
      oauth2:
        client:
          registration:
            kakao:
              client-id: ${KAKAO_REST_API_KEY}
              client-secret: ${KAKAO_CLIENT_SECRET}
              redirect-uri: ${KAKAO_REDIRECT_URI}